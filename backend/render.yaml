services:
  - type: web
    name: breatheesg-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn breatheesg.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: breatheesg-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: breatheesg-db
    databaseName: breatheesg
    user: breatheesg
    plan: free
